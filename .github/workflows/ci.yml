name: CI

# Push CI : JS syntax / build / tests + Rust check.
# Le workflow `Release` reste séparé (déclenché par tag v*).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (syntax + build + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Syntax check (node --check)
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f"; then
              echo "::error file=$f::syntax error"
              fail=1
            fi
          done < <(find frontend/src -type f -name '*.js')
          exit $fail

      - name: Unit tests
        run: npm test

      - name: Vite build
        run: npm run vite:build

      - name: Bundle size budget
        run: npm run perf:bundle

      - name: Bench (synthetic perf)
        run: npm run perf:bench

      - name: Bench regression check
        run: npm run perf:bench-compare

  rust:
    name: Rust (cargo check, Windows target)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target/
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets
